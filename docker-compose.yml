services:
  gta-claw:
    build: .
    restart: unless-stopped
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - OAUTH_ENABLED=${OAUTH_ENABLED:-false}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - AUTH_BASE_URL=${AUTH_BASE_URL:-}
      - OAUTH_CALLBACK_PATH=${OAUTH_CALLBACK_PATH:-/auth/callback}
      - OAUTH_SCOPE=${OAUTH_SCOPE:-copilot}
      - MicrosoftAppId=${MicrosoftAppId}
      - MicrosoftAppPassword=${MicrosoftAppPassword}
      - AGENT_ROLE_URL=${AGENT_ROLE_URL}
      - ENABLED_SKILLS=${ENABLED_SKILLS}
      - COPILOT_MODEL=${COPILOT_MODEL:-gpt-4o}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MAX_SESSIONS=${MAX_SESSIONS:-100}
      - SESSION_TTL_MS=${SESSION_TTL_MS:-3600000}
      - SKILL_EXEC_TIMEOUT_MS=${SKILL_EXEC_TIMEOUT_MS:-30000}
      - SDK_REQUEST_TIMEOUT_MS=${SDK_REQUEST_TIMEOUT_MS:-120000}
      - RATE_LIMIT_PER_MIN=${RATE_LIMIT_PER_MIN:-30}
      - ALLOWED_SKILL_DOMAINS=${ALLOWED_SKILL_DOMAINS:-}
      - TRUST_PROXY=${TRUST_PROXY:-false}
      - DOMAIN=${DOMAIN:-localhost}
      - AUTO_UPDATE=${AUTO_UPDATE:-false}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - ENABLE_TEAMS=${ENABLE_TEAMS:-true}
      - ENABLE_TELEGRAM=${ENABLE_TELEGRAM:-false}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_POLL_INTERVAL_MS=${TELEGRAM_POLL_INTERVAL_MS:-2000}
      - ENABLE_DISCORD=${ENABLE_DISCORD:-false}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_GATEWAY_URL=${DISCORD_GATEWAY_URL:-wss://gateway.discord.gg/?v=10&encoding=json}
      - DISCORD_GATEWAY_INTENTS=${DISCORD_GATEWAY_INTENTS:-33281}
      - ENABLE_WHATSAPP=${ENABLE_WHATSAPP:-false}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN:-}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN:-}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID:-}
      - WHATSAPP_WEBHOOK_PATH=${WHATSAPP_WEBHOOK_PATH:-/whatsapp/webhook}
    networks:
      - gta-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3978/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      gta-claw:
        condition: service_healthy
    networks:
      - gta-net

volumes:
  caddy_data:
  caddy_config:

networks:
  gta-net:
    driver: bridge
