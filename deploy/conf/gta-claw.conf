# ============================================================================
# GTA-Claw deployment config
# Usage: ./run.sh --config conf/gta-claw.conf
# ============================================================================

# ---------------------------- Auth (choose one) ----------------------------
# Mode A: GitHub PAT
GITHUB_TOKEN=

# Mode B: OAuth web authorization
OAUTH_ENABLED=true
GITHUB_CLIENT_ID=
GITHUB_CLIENT_SECRET=
AUTH_BASE_URL=https://your-domain.com
OAUTH_CALLBACK_PATH=/auth/callback
OAUTH_SCOPE=copilot

# ---------------------------- Required ----------------------------

# Azure Bot credentials
MicrosoftAppId=00000000-0000-0000-0000-000000000000
MicrosoftAppPassword=your_microsoft_app_password

# Role JSON URL, e.g.:
# { "content": "You are...", "model": "gpt-4o" }
AGENT_ROLE_URL=https://your-domain.com/role.json

# Skill module URLs (comma-separated)
ENABLED_SKILLS=https://your-domain.com/skill1.json,https://your-domain.com/skill2.json

# ---------------------------- Optional ----------------------------
# Docker image to pull
DOCKER_IMAGE=gtastudio/gta-claw:latest

# Fallback model (role.json model field overrides this)
COPILOT_MODEL=gpt-4o

# Domain for Caddy HTTPS
DOMAIN=your-domain.com

# Logging
LOG_LEVEL=info

# Session and timeout controls
MAX_SESSIONS=100
SESSION_TTL_MS=3600000
SKILL_EXEC_TIMEOUT_MS=30000
SDK_REQUEST_TIMEOUT_MS=120000

# Rate limit per IP per minute for /api/messages
RATE_LIMIT_PER_MIN=30

# Optional skill outbound domain allowlist (comma-separated, empty means allow all)
ALLOWED_SKILL_DOMAINS=

# Trust upstream proxy headers only if behind trusted reverse proxy
TRUST_PROXY=false

# Auto-update SDK/CLI at startup
AUTO_UPDATE=false

# Protect /admin/reload endpoint; empty to disable
ADMIN_TOKEN=

# ---------------------------- Channel Switches ----------------------------
ENABLE_TEAMS=true

ENABLE_TELEGRAM=false
TELEGRAM_BOT_TOKEN=
TELEGRAM_POLL_INTERVAL_MS=2000

ENABLE_DISCORD=false
DISCORD_BOT_TOKEN=
DISCORD_GATEWAY_URL=wss://gateway.discord.gg/?v=10&encoding=json
DISCORD_GATEWAY_INTENTS=33281

ENABLE_WHATSAPP=false
WHATSAPP_VERIFY_TOKEN=
WHATSAPP_ACCESS_TOKEN=
WHATSAPP_PHONE_NUMBER_ID=
WHATSAPP_WEBHOOK_PATH=/whatsapp/webhook
